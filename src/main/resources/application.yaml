spring:
    application:
        name: saas-app
    config:
      import: optional:file:.env[.properties]
    profiles:
      active: ${SPRING_PROFILES_ACTIVE:dev}
      
    
    # Configuration de base de donnée.
    
    datasource:
      url: jdbc:postgresql://${DB_HOST:8080}:${DB_PORT:8080}/${DB_NAME:8080-app-db}
      username: ${DB_USERNAME:8080}
      password: ${DB_PASSWORD:8080}
      hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        connection-timeout: 20000
        idle-timeout: 30000
        max-lifetime: 1200000
        
    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
        ddl-auto: validate
      properties:
        hibernate:
          format_sql: true
          use_sql_comments: true
          jdbc:
            batch_size: 20
          order_insert: true
          order_updates: true
          multi_tenancy: SCHEMA
      show-sql: true
      open-in-view: false
      
      
#Flyway Configuration

    flyway:
      enabled: true
      baseline-on-migrate: true
      locations:
        - classpath:db/migration/common
        - classpath:db/migration/tenant
      schemas: public
      table: flyway_schema_history
      validate-on-migrate: true
      
# Configuration du serveur
server:
  port: ${SERVER_PORT:8180}